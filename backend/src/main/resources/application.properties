# ============================================================
# APPLICATION PROPERTIES — EXPLAINED
# ============================================================

# Server port — the port your backend listens on
server.port=8080

# ============================================================
# H2 DATABASE CONFIGURATION
# ============================================================
# spring.datasource.url — JDBC URL. 
# For local development, it defaults to H2. For Render, set the environment variable.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:emberleaf;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ============================================================
# H2 CONSOLE — Web UI accessible at localhost:8080/h2-console
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / HIBERNATE CONFIG
# ============================================================
# Hibernate will auto-detect the dialect (H2 or PostgreSQL)
# spring.jpa.hibernate.ddl-auto=update
#   "update" means: modify tables to match @Entity classes without dropping data.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}

# spring.jpa.show-sql=true — Logs every SQL query to console. Useful for debugging.
spring.jpa.show-sql=true

# spring.jpa.properties.hibernate.format_sql=true — Pretty-print SQL in logs
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# STRIPE CONFIGURATION
# ============================================================
# Get your test key from https://dashboard.stripe.com/test/apikeys
# DO NOT use a live (sk_live_*) key during development!
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_YOUR_KEY_HERE}

# ============================================================
# JWT CONFIGURATION
# ============================================================
# Secret key string (must be at least 32 chars for HS256)
jwt.secret=chaiAndLeafJwtSecretKeyMustBeAtLeast32CharsLongForHmacSha256

# ============================================================
# EMAIL (Gmail SMTP) — for account verification emails
# ============================================================
# 1. Enable 2-Step Verification on your Google Account
# 2. Go to: Google Account -> Security -> App passwords
# 3. Generate an App Password for "Mail" (16-char code, no spaces)
# 4. Paste that code as spring.mail.password below (not your real Gmail password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=madmaddog858@gmail.com
spring.mail.password=${MAIL_PASSWORD:YOUR_PASSWORD_HERE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL used in verification email links
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

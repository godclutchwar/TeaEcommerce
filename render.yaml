services:
  - type: web
    name: chaiandleaf-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chaiandleaf-db
          property: connectionString
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET
        generateValue: true
      # Set these manually in the Render dashboard after first deploy:
      # STRIPE_SECRET_KEY  — Stripe secret key (sk_test_... or sk_live_...)
      # MAIL_PASSWORD      — Gmail app password (16-char, no spaces)
      # APP_FRONTEND_URL   — deployed frontend URL, e.g. https://yourapp.vercel.app
      # ALLOWED_ORIGINS    — same value as APP_FRONTEND_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: chaiandleaf-db
    plan: free
    databaseName: chaiandleaf
    user: chaiandleaf
